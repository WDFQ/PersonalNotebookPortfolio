<!-- PLACEHOLDER SCREENSHOT: swap for a real diagram/screenshot of the
     Remote Subnet Connection project. Abstract network topology
     (slate + teal, WireGuard-tunnel dashed links). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img">
  <rect width="800" height="500" fill="#14212b"/>
  <!-- faint grid -->
  <g stroke="#1c2f3d" stroke-width="1">
    <path d="M100 0 V500 M200 0 V500 M300 0 V500 M400 0 V500 M500 0 V500 M600 0 V500 M700 0 V500"/>
    <path d="M0 100 H800 M0 200 H800 M0 300 H800 M0 400 H800"/>
  </g>
  <!-- tunnel links -->
  <g fill="none" stroke-linecap="round">
    <path d="M180 150 C 280 90, 520 90, 620 150" stroke="#2dd4bf" stroke-width="3" stroke-dasharray="10 8"/>
    <path d="M180 170 L 400 330" stroke="#3d5a70" stroke-width="3"/>
    <path d="M620 170 L 400 330" stroke="#3d5a70" stroke-width="3"/>
    <path d="M180 150 L 110 330 M180 150 L 250 330" stroke="#3d5a70" stroke-width="2.5"/>
    <path d="M620 150 L 550 330 M620 150 L 690 330" stroke="#3d5a70" stroke-width="2.5"/>
  </g>
  <!-- tunnel label chip -->
  <rect x="330" y="80" width="140" height="26" rx="13" fill="#0e3b36" stroke="#2dd4bf" stroke-width="2"/>
  <rect x="352" y="90" width="96" height="7" rx="3.5" fill="#2dd4bf" opacity="0.7"/>
  <!-- router A -->
  <g transform="translate(120,120)">
    <rect width="120" height="56" rx="10" fill="#1d3242" stroke="#2dd4bf" stroke-width="2.5"/>
    <circle cx="24" cy="28" r="8" fill="#2dd4bf"/>
    <rect x="44" y="16" width="58" height="9" rx="4" fill="#3d5a70"/>
    <rect x="44" y="33" width="40" height="9" rx="4" fill="#3d5a70"/>
  </g>
  <!-- router B -->
  <g transform="translate(560,120)">
    <rect width="120" height="56" rx="10" fill="#1d3242" stroke="#2dd4bf" stroke-width="2.5"/>
    <circle cx="24" cy="28" r="8" fill="#2dd4bf"/>
    <rect x="44" y="16" width="58" height="9" rx="4" fill="#3d5a70"/>
    <rect x="44" y="33" width="40" height="9" rx="4" fill="#3d5a70"/>
  </g>
  <!-- central switch -->
  <g transform="translate(345,305)">
    <rect width="110" height="50" rx="10" fill="#1d3242" stroke="#7fb3e8" stroke-width="2.5"/>
    <rect x="18" y="14" width="74" height="8" rx="4" fill="#3d5a70"/>
    <rect x="18" y="28" width="50" height="8" rx="4" fill="#3d5a70"/>
  </g>
  <!-- leaf hosts -->
  <g fill="#1d3242" stroke="#3d5a70" stroke-width="2">
    <rect x="80" y="330" width="60" height="40" rx="8"/>
    <rect x="220" y="330" width="60" height="40" rx="8"/>
    <rect x="520" y="330" width="60" height="40" rx="8"/>
    <rect x="660" y="330" width="60" height="40" rx="8"/>
  </g>
  <!-- status bar -->
  <rect x="80" y="430" width="640" height="30" rx="8" fill="#0f1a22"/>
  <circle cx="102" cy="445" r="6" fill="#22c55e"/>
  <rect x="120" y="440" width="180" height="10" rx="5" fill="#1d3242"/>
  <rect x="560" y="440" width="140" height="10" rx="5" fill="#1d3242"/>
</svg>
