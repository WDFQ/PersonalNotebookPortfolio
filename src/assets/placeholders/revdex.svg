<!-- PLACEHOLDER SCREENSHOT: swap for a real RevDex screenshot.
     Abstract mockup of a dark car-spotting mobile app (charcoal + turbo orange,
     echoing the "Auto Lens Spotter" Stitch design). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img">
  <rect width="800" height="500" fill="#1e100c"/>
  <!-- phone frame -->
  <g transform="translate(70,40)">
    <rect x="0" y="0" width="210" height="420" rx="24" fill="#180b07" stroke="#43302b" stroke-width="3"/>
    <rect x="14" y="16" width="182" height="8" rx="4" fill="#372621"/>
    <!-- viewfinder -->
    <rect x="14" y="40" width="182" height="230" rx="10" fill="#271813"/>
    <path d="M34 60 h26 M34 60 v26 M176 60 h-26 M176 60 v26 M34 250 h26 M34 250 v-26 M176 250 h-26 M176 250 v-26"
          stroke="#00e5ff" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- car silhouette -->
    <path d="M55 190 q14 -30 50 -32 q40 -2 52 26 l18 6 v14 h-14 a12 12 0 0 1 -24 0 h-52 a12 12 0 0 1 -24 0 h-10 z"
          fill="#43302b"/>
    <!-- shutter -->
    <circle cx="105" cy="330" r="34" fill="#ff5722"/>
    <circle cx="105" cy="330" r="26" fill="none" stroke="#1e100c" stroke-width="4"/>
    <rect x="30" y="382" width="44" height="10" rx="5" fill="#372621"/>
    <rect x="136" y="382" width="44" height="10" rx="5" fill="#372621"/>
  </g>
  <!-- garage grid -->
  <g transform="translate(330,40)">
    <rect x="0" y="0" width="200" height="26" rx="6" fill="#372621"/>
    <rect x="220" y="0" width="90" height="26" rx="13" fill="#ff5722"/>
    <g transform="translate(0,50)">
      <rect width="190" height="120" rx="10" fill="#271813" stroke="#929090" stroke-width="2"/>
      <rect x="14" y="86" width="90" height="12" rx="6" fill="#43302b"/>
      <path d="M40 60 q10 -20 36 -21 q28 -1 37 18 l13 4 v10 h-10 a9 9 0 0 1 -18 0 h-37 a9 9 0 0 1 -18 0 h-7 z" fill="#43302b"/>
    </g>
    <g transform="translate(210,50)">
      <rect width="190" height="120" rx="10" fill="#271813" stroke="#00e5ff" stroke-width="2"/>
      <rect x="14" y="86" width="110" height="12" rx="6" fill="#43302b"/>
      <path d="M40 60 q10 -20 36 -21 q28 -1 37 18 l13 4 v10 h-10 a9 9 0 0 1 -18 0 h-37 a9 9 0 0 1 -18 0 h-7 z" fill="#372621"/>
    </g>
    <g transform="translate(0,190)">
      <rect width="190" height="120" rx="10" fill="#271813" stroke="#a855f7" stroke-width="2"/>
      <rect x="14" y="86" width="100" height="12" rx="6" fill="#43302b"/>
      <path d="M40 60 q10 -20 36 -21 q28 -1 37 18 l13 4 v10 h-10 a9 9 0 0 1 -18 0 h-37 a9 9 0 0 1 -18 0 h-7 z" fill="#372621"/>
    </g>
    <g transform="translate(210,190)">
      <rect width="190" height="120" rx="10" fill="#271813" stroke="#eab308" stroke-width="2"/>
      <rect x="14" y="86" width="80" height="12" rx="6" fill="#43302b"/>
      <path d="M40 60 q10 -20 36 -21 q28 -1 37 18 l13 4 v10 h-10 a9 9 0 0 1 -18 0 h-37 a9 9 0 0 1 -18 0 h-7 z" fill="#43302b"/>
    </g>
    <rect x="0" y="330" width="400" height="14" rx="7" fill="#271813"/>
    <rect x="0" y="356" width="290" height="14" rx="7" fill="#271813"/>
    <rect x="0" y="396" width="130" height="30" rx="15" fill="none" stroke="#00e5ff" stroke-width="2"/>
