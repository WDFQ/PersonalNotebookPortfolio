<!-- PLACEHOLDER SCREENSHOT: swap for a real Suppsense screenshot.
     Abstract mockup of a light supplement-scanner web app (green + cream). -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" role="img">
  <rect width="800" height="500" fill="#f4f8f2"/>
  <!-- browser chrome -->
  <rect width="800" height="42" fill="#e4ede0"/>
  <circle cx="24" cy="21" r="7" fill="#ef4444"/>
  <circle cx="48" cy="21" r="7" fill="#eab308"/>
  <circle cx="72" cy="21" r="7" fill="#22c55e"/>
  <rect x="120" y="12" width="420" height="18" rx="9" fill="#f4f8f2"/>
  <!-- header -->
  <rect x="0" y="42" width="800" height="64" fill="#2e7d4f"/>
  <rect x="36" y="64" width="150" height="20" rx="10" fill="#ffffff" opacity="0.9"/>
  <rect x="560" y="64" width="80" height="20" rx="10" fill="#ffffff" opacity="0.4"/>
  <rect x="660" y="64" width="100" height="20" rx="10" fill="#ffffff" opacity="0.4"/>
  <!-- scan panel -->
  <g transform="translate(36,140)">
    <rect width="330" height="300" rx="14" fill="#ffffff" stroke="#d5e3d0" stroke-width="2"/>
    <rect x="55" y="40" width="220" height="120" rx="10" fill="#eef5ec"/>
    <!-- barcode -->
    <g fill="#1f2d24">
      <rect x="85" y="62" width="6" height="76"/><rect x="97" y="62" width="3" height="76"/>
      <rect x="106" y="62" width="9" height="76"/><rect x="121" y="62" width="3" height="76"/>
      <rect x="130" y="62" width="6" height="76"/><rect x="142" y="62" width="12" height="76"/>
      <rect x="160" y="62" width="3" height="76"/><rect x="169" y="62" width="6" height="76"/>
      <rect x="181" y="62" width="9" height="76"/><rect x="196" y="62" width="3" height="76"/>
      <rect x="205" y="62" width="6" height="76"/><rect x="217" y="62" width="12" height="76"/>
      <rect x="235" y="62" width="6" height="76"/>
    </g>
    <rect x="52" y="94" width="226" height="4" rx="2" fill="#e5484d" opacity="0.8"/>
    <rect x="85" y="190" width="160" height="40" rx="20" fill="#2e7d4f"/>
    <rect x="55" y="252" width="220" height="12" rx="6" fill="#eef5ec"/>
  </g>
  <!-- results panel -->
  <g transform="translate(400,140)">
    <rect width="364" height="300" rx="14" fill="#ffffff" stroke="#d5e3d0" stroke-width="2"/>
    <rect x="24" y="24" width="180" height="18" rx="9" fill="#cfe3ca"/>
    <g transform="translate(24,64)">
      <rect width="316" height="30" rx="8" fill="#eef5ec"/>
      <circle cx="18" cy="15" r="7" fill="#2e7d4f"/>
      <rect x="36" y="9" width="180" height="12" rx="6" fill="#cfe3ca"/>
    </g>
    <g transform="translate(24,104)">
      <rect width="316" height="30" rx="8" fill="#eef5ec"/>
      <circle cx="18" cy="15" r="7" fill="#2e7d4f"/>
      <rect x="36" y="9" width="140" height="12" rx="6" fill="#cfe3ca"/>
    </g>
    <g transform="translate(24,144)">
      <rect width="316" height="30" rx="8" fill="#fdf3e0"/>
      <circle cx="18" cy="15" r="7" fill="#eab308"/>
      <rect x="36" y="9" width="200" height="12" rx="6" fill="#f0dfb4"/>
    </g>
    <!-- AI summary box -->
    <rect x="24" y="194" width="316" height="82" rx="10" fill="#f0f7ff" stroke="#bcd8f5" stroke-width="2"/>
    <rect x="40" y="210" width="120" height="10" rx="5" fill="#7fb3e8"/>
    <rect x="40" y="230" width="284" height="8" rx="4" fill="#d3e5f7"/>
    <rect x="40" y="246" width="284" height="8" rx="4" fill="#d3e5f7"/>
    <rect x="40" y="262" width="180" height="8" rx="4" fill="#d3e5f7"/>
  </g>
</svg>
